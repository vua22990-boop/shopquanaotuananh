<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Mini App Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 15px;
    }
    .box {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #0088cc;
      color: white;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>🚀 Mini App Telegram</h3>
  <p id="user">Đang tải...</p>
</div>

<div class="box">
  <button onclick="buy()">Mua acc (demo)</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const user = tg.initDataUnsafe?.user;

  if (user) {
    document.getElementById("user").innerHTML =
      `👤 ${user.first_name}<br>🆔 ${user.id}`;
  } else {
    document.getElementById("user").innerText = "Không có user";
  }

  function buy() {
    tg.showAlert("Bạn đã bấm MUA (demo)");
  }
</script>

</body>
</html>
